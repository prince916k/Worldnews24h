<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World News - Last 24 Hours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="kicker">Global Desk</p>
        <h1>World News Radar</h1>
        <p class="subtitle">Live headlines from the last 24 hours only.</p>
        <div class="hero-actions">
          <button id="refreshBtn" class="refresh-btn">Refresh Feed</button>
          <p id="meta">Loading latest updates...</p>
        </div>
      </section>

      <section id="sourceBar" class="source-bar" aria-live="polite"></section>

      <section id="newsList" class="news-grid"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
